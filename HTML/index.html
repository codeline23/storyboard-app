<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 문서 메타 정보 및 제목 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuta's Engine</title>

    <!-- 외부 라이브러리 스크립트: 드래그 앤 드롭 및 Firebase -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>

    <!-- 스타일시트 연결 -->
    <link rel="stylesheet" href="storyboard.css">
    <!-- JavaScript 파일 연결 -->
    <script src="storyboard.js"></script>
</head>
<body>
    <!-- 앱 헤더: 로고, 프로젝트 제목, 버튼들 -->
    <header class="app-header">
        <div class="header-side">
            <div class="app-logo">YE</div>
        </div>
        <div class="project-title" onclick="openModal('projectModal')">이그리에가 ▾</div>
        <div class="header-side" style="justify-content: flex-end;">
            <button class="icon-btn" onclick="location.reload()">⟳</button>
            <button class="icon-btn" onclick="alert('자동 저장되었습니다.')">✔</button>
        </div>
    </header>

    <!-- 탭 메뉴: 타임라인, 스토리, 캐릭터 탭 -->
    <nav class="tab-menu">
        <div class="tab-item active" onclick="showTab('timeline', this)">타임라인</div>
        <div class="tab-item" onclick="showTab('story', this)">스토리</div>
        <div class="tab-item" onclick="showTab('char', this)">캐릭터도감</div>
    </nav>

    <!-- 메인 콘텐츠 영역 -->
    <main class="content-body">
        <!-- 타임라인 뷰: 이벤트 타임라인 표시 -->
        <div id="timeline-view" class="view active">
            <div class="tl-wrapper">
                <div class="center-line"></div>
                <div id="tl-list"></div>
            </div>
        </div>

        <!-- 스토리 뷰: 텍스트 편집 영역 -->
        <div id="story-view" class="view" style="padding: 20px;">
            <textarea id="story-treatment" rows="15" placeholder="이곳에 기본 트리트먼트를 작성하세요.">
                첫 번째 단락: 주인공이 모험을 시작한다.
            </textarea>
        </div>

        <!-- 캐릭터 뷰: 캐릭터 목록 (준비 중) -->
        <div id="char-view" class="view" style="padding: 20px;">
            <div style="text-align: center; color: #adb5bd; padding-top: 50px;">
                등록된 캐릭터가 없습니다.
            </div>
        </div>
    </main>

    <!-- 프로젝트 관리 모달 -->
    <div id="projectModal" class="modal">
        <div class="modal-content" style="background: white; padding: 25px; border-radius: 18px; width: 300px;">
            <h4 style="margin-bottom: 15px; font-size: 16px;">프로젝트 관리</h4>
            <div id="project-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee;">
                    <span style="font-weight: bold; color: var(--primary);">이그리에가</span>
                    <span style="font-size: 11px; color: #adb5bd;">기본</span>
                </div>
            </div>
            <div class="input-row" style="margin-bottom: 0;">
                <input type="text" id="new-project-name" placeholder="새 프로젝트명">
                <button class="f-btn-text" style="background: var(--primary); color: white; border-radius: 8px; padding: 0 10px;" onclick="alert('준비중인 기능입니다.')">
                    추가
                </button>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="f-btn-text" style="color: #ff6b6b;" onclick="alert('기본 프로젝트는 삭제할 수 없습니다.')">
                    삭제
                </button>
                <button class="f-btn-text" style="color: #adb5bd;" onclick="closeModal('projectModal')">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <!-- 드로어 백드롭 -->
    <div class="drawer-backdrop" onclick="closeDrawer()"></div>

    <!-- 스토리 드로어: 문서 목록 -->
    <div class="slide-drawer" id="story-drawer">
        <button class="sub-btn" style="width: 100%; background: var(--bg); border: 1px dashed #adb5bd; margin-bottom: 20px;" onclick="createFolder()">
            + 폴더 만들기
        </button>
        <h5 style="font-size: 12px; color: #adb5bd; margin-bottom: 10px;">문서 목록</h5>
        <div id="treatment-list" style="overflow-y: auto; flex: 1;">
            <div style="font-size: 13px; color: #adb5bd; text-align: center; padding: 20px 0;">
                작성된 문서가 없습니다.
            </div>
        </div>
        <button class="f-btn-text" style="align-self: flex-end; color: #adb5bd; margin-top: 10px;" onclick="closeDrawer()">
            닫기
        </button>
    </div>

    <!-- 이벤트 상세 모달 -->
    <div id="detailModal" class="modal">
        <div class="modal-content compact">
            <div class="top-tabs" id="modal-tab-container"></div>
            <div class="modal-main-card">
                <div id="detail-body"></div>
                <div class="modal-footer-clean" id="detail-footer"></div>
            </div>
        </div>
    </div>

    <!-- 이벤트 추가/편집 모달 -->
    <div id="eventModal" class="modal">
        <div class="modal-content" style="background: white; padding: 25px; border-radius: 18px; width: 320px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h4 id="event-title" style="font-size: 16px;">기록하기</h4>
                <button class="f-btn-text" style="font-size: 12px; border: 1px solid #eee; border-radius: 6px; padding: 4px 8px; color: #495057;" onclick="openModal('eraModal')">
                    연대관리
                </button>
            </div>
            <div class="input-row">
                <select id="e-era" style="flex: 1.5;"></select>
                <input type="number" id="e-year" placeholder="년" style="flex: 1;">
                <input type="number" id="e-month" placeholder="월" style="flex: 1;">
            </div>
            <textarea id="e-text" rows="5" placeholder="어떤 일이 일어났나요?"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="f-btn-text" style="flex: 1; background: var(--primary); color: white; border-radius: 10px; padding: 12px;" onclick="saveEvent()">
                    저장하기
                </button>
                <button class="f-btn-text" style="flex: 1; background: #f1f3f5; color: #adb5bd; border-radius: 10px; padding: 12px;" onclick="closeModal('eventModal')">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <!-- 연대 관리 모달 -->
    <div id="eraModal" class="modal">
        <div class="modal-content" style="background: white; padding: 20px; border-radius: 15px; width: 280px;">
            <h4 style="margin-bottom: 15px; font-size: 14px;">연대 관리</h4>
            <div id="era-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 15px;"></div>
            <div class="input-row" style="margin-bottom: 0;">
                <input type="text" id="new-era-name" placeholder="새 연대 이름">
                <button class="f-btn-text" style="background: var(--primary); color: white; border-radius: 8px; padding: 0 10px;" onclick="addNewEra()">
                    추가
                </button>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
                <button class="f-btn-text" style="color: #adb5bd;" onclick="closeModal('eraModal')">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <!-- 가지 추가 모달 -->
    <div id="branchModal" class="modal">
        <div class="modal-content" style="background: white; padding: 20px; border-radius: 15px; width: 280px;">
            <h4 style="margin-bottom: 15px; font-size: 14px;">새로운 가지(분기) 추가</h4>
            <textarea id="b-text" rows="4" placeholder="내용을 입력하세요..."></textarea>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="f-btn-text" style="flex: 1;" onclick="saveBranch()">저장</button>
                <button class="f-btn-text" style="color: #adb5bd;" onclick="closeModal('branchModal')">취소</button>
            </div>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="background: white; padding: 25px; border-radius: 18px; width: 280px; text-align: center;">
            <p id="confirm-msg" style="font-size: 15px; margin-bottom: 25px; line-height: 1.5;"></p>
            <div style="display: flex; gap: 12px;">
                <button class="f-btn-text" id="confirm-ok" style="flex: 1; background: #f1f3f5; padding: 12px; border-radius: 10px;">
                    확인
                </button>
                <button class="f-btn-text" onclick="closeModal('confirmModal')" style="flex: 1; color: #adb5bd;">
                    취소
                </button>
            </div>
        </div>
    </div>

    <!-- 플로팅 액션 버튼 및 팝업 메뉴 -->
    <div class="fab-wrap">
        <!-- 스토리 메뉴 팝업 -->
        <div class="pop-menu" id="story-menu">
            <div class="pop-item" onclick="openDrawer(); closePopMenus();">📚 목록 열기</div>
            <div class="pop-item" onclick="exportParagraph(); closePopMenus();">📤 단락 내보내기</div>
        </div>

        <!-- 타임라인 메뉴 팝업 -->
        <div class="pop-menu" id="timeline-menu">
            <div class="pop-item" onclick="openModal('eventModal'); closePopMenus();">📝 이벤트 추가</div>
            <div class="pop-item" onclick="openModal('branchModal'); closePopMenus();">🌿 가지 추가</div>
        </div>

        <!-- 캐릭터 메뉴 팝업 -->
        <div class="pop-menu" id="char-menu">
            <div class="pop-item" onclick="alert('캐릭터 추가 창 준비중'); closePopMenus();">👤 캐릭터 추가</div>
            <div class="pop-item" onclick="alert('관계도 정리 창 준비중'); closePopMenus();">🕸 관계도 정리</div>
        </div>

        <!-- 메인 FAB 버튼 -->
        <button class="main-fab" onclick="handleFabClick()">+</button>
    </div>
</body>
</html></content>
